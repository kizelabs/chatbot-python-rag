services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: chatbot-pgvector
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chatbot-app
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql+psycopg://chatbot:chatbot123@pgvector:5432/chatbot_rag
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
